inputs:
  ref:
    type: string
    required: false
    default: origin/master
    description: "Git ref to release (branch or SHA). Default: origin/master"
  bump:
    type: string
    required: false
    default: "patch"
    description: "Version bump type: major, minor, or patch (Default: patch)"
    options: [ "major", "minor", "patch", "none" ]
  version:
    type: string
    required: false
    default: ""
    description: "Explicit version override (skips auto-increment if provided)"

secrets:
  artifactory-username: artifactory-username
  artifactory-password: artifactory-password

jobs:
  publish:
    steps:
      - name: Checkout
        id: checkout
        uses: action/checkout
        with:
          repository: protobuf-crdt
          ref: ${{ inputs.ref }}

      - name: Setup Java
        id: setup
        run: |
          # Ensure Java 17+ is available
          java -version

      # Note: Requires CI runner to have write access (ssh-key) to push version bump commits
      - name: Bump Version
        id: bump_version
        run: |
          # Debug: Show current state
          echo "=== Debug Info ==="
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Current branch: $(git branch --show-current || echo 'detached HEAD')"
          echo "Input ref: ${{ inputs.ref }}"
          echo "Input bump: ${{ inputs.bump }}"
          echo "=================="

          # Skip if explicit version provided
          if [ -n "${{ inputs.version }}" ]; then
            echo "Using explicit version: ${{ inputs.version }}"
            echo "EXPLICIT_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            exit 0
          fi

          # Skip if bump=none
          if [ "${{ inputs.bump }}" = "none" ]; then
            echo "Skipping version bump (bump=none)"
            exit 0
          fi

          # Extract branch name (strip origin/ prefix if present)
          REF="${{ inputs.ref }}"
          BRANCH="${REF#origin/}"

          # Check if ref looks like a SHA (40 hex chars) or short SHA (7+ hex chars)
          if echo "$BRANCH" | grep -qE '^[0-9a-f]{7,40}$'; then
            echo "ERROR: ref appears to be a SHA ($BRANCH), cannot push version bump."
            echo "To publish with version bump, use a branch name instead of SHA."
            echo "Alternatively, use bump=none to skip version bumping."
            exit 1
          fi

          # Fetch latest and rebase BEFORE making changes (working tree must be clean)
          echo "Fetching latest from origin/$BRANCH..."
          if ! git fetch origin "$BRANCH"; then
            echo "ERROR: Failed to fetch origin/$BRANCH"
            exit 1
          fi

          echo "Rebasing onto origin/$BRANCH..."
          if ! git rebase "origin/$BRANCH"; then
            echo "ERROR: Failed to rebase onto origin/$BRANCH"
            git rebase --abort || true
            exit 1
          fi
          echo "Current commit after rebase: $(git rev-parse HEAD)"

          # Now bump the version (after rebase so working tree is clean)
          echo "Bumping ${{ inputs.bump }} version..."
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh ${{ inputs.bump }} --quiet

          # Read the new version
          MAJOR=$(grep "^version.major=" gradle.properties | cut -d'=' -f2)
          MINOR=$(grep "^version.minor=" gradle.properties | cut -d'=' -f2)
          PATCH=$(grep "^version.patch=" gradle.properties | cut -d'=' -f2)
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          # Commit the version bump (don't push yet - wait for successful build/publish)
          echo "Committing version bump..."
          git add gradle.properties
          git commit -m "Bump version to $NEW_VERSION"
          echo "Commit created: $(git rev-parse HEAD)"

          # Store branch name for later push step
          echo "BUMP_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Build
        id: build
        run: |
          ./gradlew clean build

      - name: "Publish to Artifactory"
        id: publish
        env:
          ARTIFACTORY_PASSWORD: ${{ secrets.artifactory-password }}
          ARTIFACTORY_USERNAME: ${{ secrets.artifactory-username }}
        run: |
          # Use explicit version if provided, otherwise use version from gradle.properties
          if [ -n "$EXPLICIT_VERSION" ]; then
            VERSION="$EXPLICIT_VERSION"
            echo "Publishing version: $VERSION (explicit override)"
            ./gradlew publish -Pversion="$VERSION"
          else
            # Use version from gradle.properties (possibly bumped)
            MAJOR=$(grep "^version.major=" gradle.properties | cut -d'=' -f2)
            MINOR=$(grep "^version.minor=" gradle.properties | cut -d'=' -f2)
            PATCH=$(grep "^version.patch=" gradle.properties | cut -d'=' -f2)
            VERSION="$MAJOR.$MINOR.$PATCH"
            echo "Publishing version: $VERSION"
            ./gradlew publish
          fi

      # Push version bump and tag only after successful build and publish
      - name: "Push Version and Tag"
        id: push_version
        run: |
          # Skip if no version bump was performed
          if [ -z "$BUMP_BRANCH" ]; then
            echo "No version bump to push (bump=none or explicit version)"
            exit 0
          fi

          # Get the version for tagging
          if [ -n "$EXPLICIT_VERSION" ]; then
            VERSION="$EXPLICIT_VERSION"
          else
            MAJOR=$(grep "^version.major=" gradle.properties | cut -d'=' -f2)
            MINOR=$(grep "^version.minor=" gradle.properties | cut -d'=' -f2)
            PATCH=$(grep "^version.patch=" gradle.properties | cut -d'=' -f2)
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          TAG_NAME="v$VERSION"
          echo "Creating tag: $TAG_NAME"

          # Create annotated tag
          git tag -a "$TAG_NAME" -m "Release $VERSION"

          # Push the version bump commit and tag
          echo "Pushing version bump to branch: $BUMP_BRANCH"
          if ! git push origin HEAD:refs/heads/"$BUMP_BRANCH"; then
            echo "ERROR: Failed to push version bump to $BUMP_BRANCH"
            echo "Check that the CI runner has write access to the repository."
            exit 1
          fi
          echo "✓ Version bump pushed successfully"

          echo "Pushing tag: $TAG_NAME"
          if ! git push origin "$TAG_NAME"; then
            echo "ERROR: Failed to push tag $TAG_NAME"
            exit 1
          fi
          echo "✓ Tag $TAG_NAME pushed successfully"

post:
  - on: success
    run: |
      sha=$(git rev-parse HEAD)
      if [ -n "${{ inputs.version }}" ]; then
        version="${{ inputs.version }}"
      else
        # Read version from gradle.properties
        MAJOR=$(grep "^version.major=" gradle.properties | cut -d'=' -f2)
        MINOR=$(grep "^version.minor=" gradle.properties | cut -d'=' -f2)
        PATCH=$(grep "^version.patch=" gradle.properties | cut -d'=' -f2)
        version="$MAJOR.$MINOR.$PATCH"
      fi
      echo ":rocket: Successfully published *protobuf-crdt* version \`$version\` from branch \`${{ inputs.ref }}\` @ <https://github.com/csscompany-enterprise/protobuf-crdt/commit/$sha|$sha>" > /tmp/publish-success-msg
  - on: success
    uses: action/slack
    with:
      receiver: android
      message: /tmp/publish-success-msg
      type: file
  - on: failure
    run: |
      sha=$(git rev-parse HEAD)
      if [ -n "${{ inputs.version }}" ]; then
        version="${{ inputs.version }}"
      else
        # Read version from gradle.properties
        MAJOR=$(grep "^version.major=" gradle.properties | cut -d'=' -f2)
        MINOR=$(grep "^version.minor=" gradle.properties | cut -d'=' -f2)
        PATCH=$(grep "^version.patch=" gradle.properties | cut -d'=' -f2)
        version="$MAJOR.$MINOR.$PATCH"
      fi
      echo ":warning: Failed to publish *protobuf-crdt* version \`$version\` from branch \`${{ inputs.ref }}\` @ <https://github.com/csscompany-enterprise/protobuf-crdt/commit/$sha|$sha>" > /tmp/publish-failure-msg
  - on: failure
    uses: action/slack
    with:
      receiver: android
      message: /tmp/publish-failure-msg
      type: file
