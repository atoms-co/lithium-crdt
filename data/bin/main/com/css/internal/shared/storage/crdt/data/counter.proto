// Source: com/css/internal/shared/storage/crdt/data/counter.proto

syntax = "proto3";

package com.css.internal.shared.storage.crdt.data;

import "com/css/internal/shared/storage/crdt/data/version_count.proto";

option java_multiple_files = true;

// Counter CRDT with per-actor version tracking.
// 
// Counters enable collaborative increment/decrement operations that merge
// deterministically across distributed replicas. Each actor tracks its own
// contribution using version vectors, and the total counter value is the
// sum of all actor contributions.
// 
// SINGLE-ACTOR OPTIMIZATION:
// When only one actor has written to a counter, the Counter structure is
// UNNECESSARY and should be omitted. Instead:
// - The VersionNode.version represents the actor's state
// - The counter value is stored in parallel data (not in this proto)
// - This avoids allocating counter map structures for the common case
// 
// MULTI-ACTOR SEMANTICS (2+ actors):
// When multiple actors contribute, the Counter map is created:
// - Each actor has an entry in actor_count mapping actor_id → VersionCount
// - The VersionCount tracks both the actor's version and their value
// - Total counter value = sum of all actor values in actor_count
// - During merge, highest version per actor wins (per-actor LWW)
// 
// MERGE SEMANTICS:
// When merging two Counter instances:
// 1. For each actor_id, take the VersionCount with highest version
// 2. Combine all unique actor contributions
// 3. Sum the values to get the total counter value
// 
// LEAF NODE OPTIMIZATION:
// Nodes with ≤1 actor in the counter are considered leaf nodes (no traversal
// needed). Only counters with 2+ actors require traversing the actor_count map
// during merge operations.
// 
// Example - Single actor (counter field omitted):
//   VersionNode {
//     version: Version { timestamp: 1000, actor_id: 1, actor_version: 5 }
//     // No counter field - value stored in parallel data
//   }
//   // Counter value: 42 (stored separately, version represents state)
// 
// Example - Multiple actors (counter field present):
//   VersionNode {
//     version: Version { timestamp: 1200, actor_id: 2, actor_version: 8 }
//     counter: Counter {
//       actor_count: {
//         1: VersionCount { version: 5, value: 10 }  // Actor 1's contribution
//         2: VersionCount { version: 8, value: 15 }  // Actor 2's contribution
//         3: VersionCount { version: 3, value: 7 }   // Actor 3's contribution
//       }
//     }
//   }
//   // Total counter value = 10 + 15 + 7 = 32
// 
// Example - Merge scenario:
//   Local:
//     counter: {
//       1: VersionCount { version: 5, value: 10 }
//       2: VersionCount { version: 6, value: 12 }
//     }
//   Incoming:
//     counter: {
//       2: VersionCount { version: 8, value: 15 }  // Higher version for actor 2
//       3: VersionCount { version: 3, value: 7 }   // New actor
//     }
//   Merged:
//     counter: {
//       1: VersionCount { version: 5, value: 10 }  // From local (only source)
//       2: VersionCount { version: 8, value: 15 }  // From incoming (higher version)
//       3: VersionCount { version: 3, value: 7 }   // From incoming (only source)
//     }
//     // Total: 10 + 15 + 7 = 32
message Counter {
  // Maps actor_id to that actor's version and value contribution
  // Only present when 2+ actors have written to this counter
  // Single-actor counters omit this structure entirely (optimization)
  map<int64, VersionCount> actor_count = 1;
}
