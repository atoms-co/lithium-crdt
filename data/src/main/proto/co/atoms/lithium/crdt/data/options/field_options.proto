// ============================================================================
// merge_options.proto
//
// This file defines custom field options for controlling merge behavior in CRDT
// (Conflict-free Replicated Data Type) messages. These options allow you to
// specify how fields should be merged during synchronization, supporting
// advanced use cases such as replace-on-conflict behavior and repeated message
// identification by key fields.
//
// Example usage:
//
//   import "co/atoms/lithium/crdt/data/merge_options.proto";
//
//   message MyMessage {
//     // For repeated messages: specify which field number uniquely identifies elements
//     repeated NestedMessageWithId items = 1 [
//       (co.atoms.lithium.crdt.data.options.crdt_id_field) = 1
//     ];
//
//     // For any field: enable replace-on-conflict merge strategy
//     NestedMessage nested = 2 [
//       (co.atoms.lithium.crdt.data.options.crdt_merge_strategy) = REPLACE
//     ];
//   }
//
// ============================================================================

syntax = "proto3";

package co.atoms.lithium.crdt.data.options;

import "google/protobuf/descriptor.proto";

enum FieldMergeStrategy {
  // Recursively merge into child fields using their strategies.
  // For primitives, behaves like REPLACE.
  // Conflicts resolved by version comparator (default: last-write-wins).
  MERGE = 0;

  // Replace entire field value atomically without merging child fields.
  // Conflicts resolved by version comparator (default: last-write-wins).
  REPLACE = 1;

  // Increment/decrement operations that commute.
  // Only valid for numeric primitive fields.
  COUNTER = 2;
}

extend google.protobuf.FieldOptions {
  // How to merge concurrent writes to this field
  FieldMergeStrategy crdt_merge_strategy = 9100;

  // For repeated fields: which field number of the contained message is the ID.
  // When set, repeated fields merge by ID rather than position.
  // The ID field must be a primitive value that uniquely identifies elements.
  int32 crdt_id_field = 9101;

  // For repeated fields: path of field numbers to reach the ID field.
  // Supports nested messages: [1, 2] means "field 1's field 2 is the ID".
  // When set, repeated fields merge by ID rather than position.
  // The leaf field must be a primitive value that uniquely identifies elements.
  // Example: repeated DrawerEvent events = 1 [(crdt_id_field_path) = 1, 1];
  //   where DrawerEvent.event_info (field 1) contains EventInfo.event_id (field 1)
  repeated int32 crdt_id_field_path = 9104;

  // Valid for map and repeated types with crdt_id_field
  // When tombstones are removed all values with data will update versions to shift to the minimum bounded version in
  // the window calculated by the oldest valid tombstone to ensure merges are ignored by the new minimum version and
  // current data is not lost.
  int32 crdt_max_tombstones = 9102;

  // Valid for map and repeated types with crdt_id_field.
  // TTL relative to latest value's version (> max(Version.timestamp) - ttl)
  // When tombstones are removed all values with data will update versions to shift to the minimum bounded version in
  // the ttl window to ensure merges are ignored by the new minimum ttl and current data is not lost.
  int64 crdt_tombstone_ttl = 9103;
}
