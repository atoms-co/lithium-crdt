// CRDT Version Tree Storage Schema
//
// This schema provides efficient, flexible versioning for CRDT (Conflict-free Replicated Data Type)
// systems. It separates version information from data content using a tree structure that mirrors
// the data hierarchy, optimized for minimal storage overhead and maximum performance.
//
// Key Features:
// - Context-dependent version semantics (single version field serves multiple purposes)
// - Tree structure mirrors protobuf data for efficient traversal
// - Schema-agnostic design works with any protobuf message type
// - Optimized for space efficiency through version inheritance and leaf node elimination
// - Automatic version consistency (derived container versions cannot become stale)

syntax = "proto3";

package co.atoms.lithium.crdt.data;

import "co/atoms/lithium/crdt/data/version.proto";
import "co/atoms/lithium/crdt/data/counter.proto";

option java_multiple_files = true;

/*
 * Node in the version tree that mirrors data structure hierarchy.
 *
 * Each node represents version information at a specific location in the
 * data structure. The tree structure exactly mirrors the protobuf data
 * structure, enabling efficient parallel traversal during merge operations.
 *
 * CONTEXT-DEPENDENT VERSION SEMANTICS:
 * The 'version' field serves different purposes based on the node type:
 *
 * - PRIMITIVE VALUES (no children): Value version for last-write-wins resolution
 * - STRUCT (children.struct): Base version for field inheritance - fields without
 *   explicit versions inherit this version
 * - MAPS (children.*_map): Max version of all contained entries (derived from max of entry versions).
 *   When crdt_tombstone_ttl is defined, this max version marks the END of the TTL window.
 *   Tombstones are cleaned up FIFO when they exceed crdt_max_tombstones (default: 1024).
 *   Live data versions updated to window start when TTL window shifts to prevent data loss.
 * - REPEATED (children.repeated): Max version of list and all contained entries. Used for
 *   size conflict resolution and optional TTL window end when crdt_tombstone_ttl is defined.
 *   Same tombstone cleanup and live data version update behavior as maps for ID-based lists.
 * - COUNTER (children.counter): Actor's state version for single-actor optimization.
 *   When only one actor writes, counter field is omitted and version represents the
 *   actor's state. When 2+ actors contribute, counter map is created for per-actor tracking.
 *
 * DERIVED CONTAINER VERSIONS:
 * Container versions are computed rather than stored:
 * derivedVersion = max(node.version, ...child_versions)
 * For counters: derivedVersion = max(node.version, ...actor_versions)
 */
message VersionNode {
  Version version = 1;

  // Child version information based on the data structure type at this location
  oneof children {
    // message types (indexed by field number)
    Struct struct = 2;
    // repeated types (matching order)
    Repeated repeated = 3;
    // map<string, V> types
    StringMap string_map = 4;
    // map<int32, V> types
    Int32Map int32_map = 5;
    // map<int64, V> types
    Int64Map int64_map = 6;
    // map<bool, V> types
    BoolMap bool_map = 7;
    // Counter CRDT - per-actor version tracking (only present for 2+ actors)
    // Single-actor counters omit this field (optimization)
    Counter counter = 8;
  }

  /**
   * Version information for protobuf message fields.
   *
   * Maps protobuf field numbers to their corresponding version nodes.
   * Field numbers correspond to the protobuf field definitions in the schema.
   *
   * FIELD VERSION INHERITANCE:
   * Fields without explicit entries in the 'fields' map inherit the base version
   * from the parent VersionNode.version. This provides massive memory savings
   * for typical CRDT usage patterns where documents are created with many fields
   * at once, but only a few fields are updated over time.
   *
   * OPTIMIZATION - LEAF NODE ELIMINATION:
   * Fields with versions equal to the base version are automatically removed from
   * the fields map since they can inherit the base version implicitly. This can
   * reduce memory usage by 90%+ for typical document editing patterns.
   *
   * Example protobuf message:
   *   message UserDocument {
   *     string name = 2;              // Field 2
   *     int32 age = 4;                // Field 4
   *     map<string, string> tags = 5; // Field 5
   *   }
   *
   * Efficient representation after creation and sparse editing:
   *   VersionNode {
   *     version: Version { timestamp: 1000, actor_id: 1, actor_version: 5 }  // Base version
   *     struct: Struct {
   *       fields: {
   *         5: VersionNode {
   *           version: Version { timestamp: 1200, actor_id: 2, actor_version: 3 }
   *           string_map: StringMap { ... }
   *         }
   *       }
   *     }
   *   }
   *   // Fields 2,4 inherit base version - no explicit storage needed
   *
   * ONEOF FIELD HANDLING:
   * Oneof fields are tracked by their individual field numbers like regular fields.
   * When a oneof field is set, the CRDT implementation should clear version entries
   * for other fields in the same oneof to maintain the oneof invariant.
   *
   * Example with oneof:
   *   message Document {
   *     oneof content {
   *       string text = 1;
   *       bytes binary = 2;
   *     }
   *   }
   *
   * If text is set, only field 1 should have a version entry.
   * Setting binary should remove the version for field 1 and add one for field 2.
   */
  message Struct {
    // Sparse map: only fields that differ from base version
    // Key: protobuf field number (e.g., 1, 2, 3...)
    // Value: version node containing version info for that field
    // Fields not in this map inherit parent VersionNode.version
    map<int32, VersionNode> fields = 1;
  }

  /*
   * Version information for protobuf maps with string keys.
   *
   * Maps string keys to their corresponding version nodes. Keys are the
   * actual map keys from the protobuf map field.
   *
   * DELETION SEMANTICS WITH TOMBSTONE LIMITS:
   * Map deletions use tombstone counting for bounded memory growth:
   *
   * 1. TOMBSTONE PHASE: Deleted entries become tombstones with deletion versions
   * 2. COUNT-BASED CLEANUP: When tombstone count exceeds crdt_max_tombstones (default: 1024),
   *    oldest tombstones are removed during local write resolution
   * 3. TTL-BASED CLEANUP (optional): When crdt_tombstone_ttl is defined, tombstones older
   *    than the TTL window are also removed during local write resolution
   *
   * TOMBSTONE CLEANUP SEMANTICS:
   * - Cleanup occurs on local write resolution (not during merge)
   * - Default max tombstones: 1024 (override with crdt_max_tombstones field option)
   * - Tombstones removed FIFO (oldest first) when count exceeds limit
   * - TTL windows only exist if crdt_tombstone_ttl is defined in the schema
   * - When TTL is defined: window = [max_version - ttl, max_version]
   * - Tombstones with version < (max_version - ttl) are removed
   * - Live data entries are never removed, but versions are updated to stay in window
   *
   * LIVE DATA VERSION UPDATE ON TTL WINDOW SHIFT:
   * When a write shifts the TTL window, live data with timestamps outside the new window
   * have their versions updated to prevent data loss:
   * - New timestamp: max_version - ttl (oldest valid timestamp in new window)
   * - New actor_id/actor_version: from the write that triggered the window shift
   * - This ensures live data remains mergeable and isn't rejected as "too old"
   *
   * DERIVED MAP VERSION:
   * Container version = max(...entry_versions)
   * Parent VersionNode.version stores this max version, reflecting the most recent
   * activity in the map and serving as the TTL window end when TTL is configured.
   *
   * Example protobuf map:
   *   map<string, string> tags = {
   *     "role": "developer",
   *     "team": "backend",
   *     "location": "remote"
   *   }
   *
   * Initial VersionNode representation:
   *   VersionNode {
   *     version: Version { timestamp: 1200, actor_id: 3, actor_version: 8 }  // Max version (from "team" entry)
   *     string_map: StringMap {
   *       entries: {
   *         "role": VersionNode { version: Version { timestamp: 1100, actor_id: 2, actor_version: 5 } }      // Active
   *         "team": VersionNode { version: Version { timestamp: 1200, actor_id: 3, actor_version: 8 } }      // Active
   *         "location": VersionNode { version: Version { timestamp: 1050, actor_id: 1, actor_version: 12 } }  // Active
   *       }
   *     }
   *   }
   *   // Parent version stores max(entry versions) = 1200
   *
   * After deleting "team" entry:
   *   map<string, string> tags = {
   *     "role": "developer",
   *     "location": "remote"
   *     // "team" key removed from data
   *   }
   *
   * StringMap with tombstone:
   *   VersionNode {
   *     version: Version { timestamp: 1300, actor_id: 3, actor_version: 9 }  // Updated to max version (from tombstone)
   *     string_map: StringMap {
   *       entries: {
   *         "role": VersionNode { version: Version { timestamp: 1100, actor_id: 2, actor_version: 5 } }      // Live data
   *         "team": VersionNode { version: Version { timestamp: 1300, actor_id: 3, actor_version: 9 } }      // Tombstone
   *         "location": VersionNode { version: Version { timestamp: 1050, actor_id: 1, actor_version: 12 } }  // Live data
   *       }
   *     }
   *   }
   *   // Tombstone count: 1 (below default limit of 1024)
   *   // If crdt_tombstone_ttl is defined, TTL window end is at timestamp 1300
   *
   * Example with TTL-based cleanup (assuming crdt_tombstone_ttl = 500ms):
   * Before new write:
   *   Max version: 1300, TTL window: [800, 1300]
   *   - "role" at 1100 (in window)
   *   - "team" tombstone at 1300 (in window)
   *   - "location" at 1050 (in window)
   *
   * After adding new entry at timestamp 2000 (actor_id: 1, actor_version: 20):
   *   VersionNode {
   *     version: Version { timestamp: 2000, actor_id: 1, actor_version: 20 }  // New max version
   *     string_map: StringMap {
   *       entries: {
   *         // New TTL window: [1500, 2000]
   *         // Live data with timestamp < 1500 updated to stay in window
   *         "role": VersionNode { version: Version { timestamp: 1500, actor_id: 1, actor_version: 20 } }      // Updated from 1100
   *         "location": VersionNode { version: Version { timestamp: 1500, actor_id: 1, actor_version: 20 } }  // Updated from 1050
   *         "newkey": VersionNode { version: Version { timestamp: 2000, actor_id: 1, actor_version: 20 } }    // New entry
   *         // "team" tombstone removed: 1300 < 1500
   *       }
   *     }
   *   }
   *   // Both "role" and "location" bumped to window start (1500) with write's actor info
   *   // This prevents them from being rejected as "too old" in future merges
   */
  message StringMap {
    // Maps string keys to version information for that key-value pair
    // Parent VersionNode.version stores max(entry versions)
    // Tombstones are cleaned up when count exceeds crdt_max_tombstones or outside TTL window
    map<string, VersionNode> entries = 1;
  }

  /*
   * Version information for protobuf maps with int32 keys.
   *
   * Same tombstone cleanup semantics as StringMap. Parent VersionNode.version stores
   * max(entry versions) and serves as TTL window end when crdt_tombstone_ttl is defined.
   * Tombstones cleaned up when count exceeds crdt_max_tombstones (default: 1024).
   */
  message Int32Map {
    map<int32, VersionNode> entries = 1;
  }

  /*
   * Version information for protobuf maps with int64 keys.
   *
   * Same tombstone cleanup semantics as StringMap. Parent VersionNode.version stores
   * max(entry versions) and serves as TTL window end when crdt_tombstone_ttl is defined.
   * Tombstones cleaned up when count exceeds crdt_max_tombstones (default: 1024).
   */
  message Int64Map {
    map<int64, VersionNode> entries = 1;
  }

  /*
   * Version information for protobuf maps with boolean keys.
   *
   * Boolean maps have a naturally bounded key space (only `true` and `false`),
   * so tombstone cleanup mechanisms are unnecessary. Even with tombstones, the maximum
   * memory overhead is 2 VersionNode entries.
   *
   * DELETION SEMANTICS:
   * Uses simple tombstone approach without cleanup:
   * - Deleted entries remain as tombstones indefinitely
   * - Maximum 2 tombstones possible (one for each boolean value)
   * - Minimal memory impact due to bounded key space
   * - Parent VersionNode.version stores max(entry versions) like other map types
   * - No tombstone count limits or TTL windows needed
   *
   * Example protobuf map:
   *   map<bool, string> featureFlags = {
   *     true: "enabled",
   *     false: "disabled"
   *   }
   *
   * Corresponding representation:
   *   VersionNode {
   *     version: Version { timestamp: 1050, actor_id: 2, actor_version: 1 }  // Max version
   *     bool_map: BoolMap {
   *       entries: {
   *         true: VersionNode { version: Version { timestamp: 1000, actor_id: 1, actor_version: 1 } }
   *         false: VersionNode { version: Version { timestamp: 1050, actor_id: 2, actor_version: 1 } }
   *       }
   *     }
   *   }
   *
   * After deleting the `true` entry:
   *   map<bool, string> featureFlags = {
   *     false: "disabled"
   *   }
   *
   * BoolMap with tombstone:
   *   VersionNode {
   *     version: Version { timestamp: 1100, actor_id: 1, actor_version: 2 }  // Updated to max version (from tombstone)
   *     bool_map: BoolMap {
   *       entries: {
   *         true: VersionNode { version: Version { timestamp: 1100, actor_id: 1, actor_version: 2 } }   // Tombstone
   *         false: VersionNode { version: Version { timestamp: 1050, actor_id: 2, actor_version: 1 } }
   *       }
   *     }
   *   }
   */
  message BoolMap {
    map<bool, VersionNode> entries = 1;
  }

  /*
   * Version information for protobuf repeated field entries.
   *
   * Contains version information for each element in a protobuf repeated field.
   * The order of entries in this array corresponds to the order of elements
   * in the protobuf repeated field, enabling index-based access.
   *
   * LIST SIZE CONFLICT RESOLUTION:
   * Parent VersionNode.version stores the max of all element versions and serves
   * as the list version for size conflict resolution. When merging lists:
   *
   * 1. Higher list version (parent.version) determines authoritative size
   * 2. Elements beyond the winning size are treated as implicitly deleted
   * 3. Within the winning size, elements merge using individual versions
   * 4. When crdt_tombstone_ttl is defined, parent.version marks TTL window end
   *
   * TOMBSTONE CLEANUP (for repeated fields with crdt_id_field):
   * Repeated fields that use ID-based merging support tombstone cleanup:
   * - Count-based: Tombstones removed FIFO when exceeding crdt_max_tombstones (default: 1024)
   * - TTL-based: When crdt_tombstone_ttl is defined, tombstones outside window are removed
   * - Cleanup occurs on local write resolution
   * - Live data versions updated to stay in window (timestamp = max_version - ttl)
   * - Updated versions use actor_id/actor_version from the write that shifted the window
   *
   * DERIVED LIST VERSION:
   * Container version = max(...element_versions)
   * Parent VersionNode.version stores this max, capturing most recent list activity.
   *
   * This approach provides:
   * - Bounded growth (no unbounded tombstone accumulation)
   * - Clear size authority (highest version wins)
   * - Fine-grained element merging within established bounds
   *
   * Example protobuf repeated field:
   *   repeated string tags = ["development", "backend", "microservices"];
   *
   * Corresponding representation:
   *   VersionNode {
   *     version: Version { timestamp: 1030, actor_id: 1, actor_version: 3 }  // Max version (from "microservices")
   *     repeated: Repeated {
   *       entries: [
   *         VersionNode { version: Version { timestamp: 1000, actor_id: 1, actor_version: 1 } },  // "development"
   *         VersionNode { version: Version { timestamp: 1020, actor_id: 2, actor_version: 2 } },  // "backend"
   *         VersionNode { version: Version { timestamp: 1030, actor_id: 1, actor_version: 3 } }   // "microservices"
   *       ]
   *     }
   *   }
   *
   * Deletion example - removing last element (size reduction):
   * Before (max version 1030, size=3):
   *   repeated string tags = ["development", "backend", "microservices"];
   *
   * After deletion (max version 1060, size=2):
   *   VersionNode {
   *     version: Version { timestamp: 1060, actor_id: 2, actor_version: 6 }  // Updated max version from resize
   *     repeated: Repeated {
   *       entries: [
   *         VersionNode { version: Version { timestamp: 1000, actor_id: 1, actor_version: 1 } },  // "development"
   *         VersionNode { version: Version { timestamp: 1060, actor_id: 2, actor_version: 6 } }   // "backend" (version may update)
   *         // Entry for "microservices" implicitly deleted by size reduction
   *       ]
   *     }
   *   }
   *
   * Concurrent operation resolution:
   * Local:    ["A", "B", "C"] with Version { timestamp: 1030, ...} (max from elements, size=3)
   * Incoming: ["A", "B"] with Version { timestamp: 1060, ... } (max from resize, size=2)
   * Result:   ["A", "B"] because timestamp 1060 > 1030
   *           Element "C" is implicitly deleted by authoritative size from higher version
   */
  message Repeated {
    // Array of version nodes for each repeated field element entry
    // Index corresponds to element position in the protobuf repeated field
    // Parent VersionNode.version stores max(entry versions) and determines authoritative size
    // Elements beyond the authoritative size are implicitly deleted during merge
    repeated VersionNode entries = 1;
  }
}
