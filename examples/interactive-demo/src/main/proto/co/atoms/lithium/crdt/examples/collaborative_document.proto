syntax = "proto3";

package co.atoms.lithium.crdt.examples;

option java_multiple_files = true;

import "co/atoms/lithium/crdt/data/options/message_options.proto";

// A simple collaborative document used to demonstrate CRDT conflict resolution.
// Each field is independently version-tracked, so two devices can edit different
// fields and both changes survive after sync.
message CollaborativeDocument {
  option (co.atoms.lithium.crdt.data.options.crdt_type_name) = "CollaborativeDocument";

  string title = 1;
  string content = 2;
  string author = 3;
  int32 priority = 4;
  string status = 5;
  map<string, string> tags = 6;
}
