# Project version
version=1.0.0-SNAPSHOT

# ==============================================================================
# Gradle Performance Settings
# ==============================================================================
org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.daemon.idletimeout=600000
org.gradle.configuration-cache=false
org.gradle.configureondemand=true

# Enable Gradle file system watching
org.gradle.vfs.watch=true

# ==============================================================================
# Kotlin Settings
# ==============================================================================
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.java=true

# ==============================================================================
# CSS Artifactory Configuration
# ==============================================================================
# Artifactory hostname for downloading dependencies with VPN
# Override in local.properties with: css.buildWithoutVpn=false (default)
css.repo.hostname.use.vpn=artifactory.cssvpn.com

# Artifactory hostname for downloading dependencies without VPN
# Override in local.properties with: css.buildWithoutVpn=true
# Requires .netrc configuration with credentials
css.repo.hostname.no.vpn=artifactory.citystoragesystems.com

# ==============================================================================
# Project Information
# ==============================================================================
project.group=com.css.internal.shared.storage.crdt
project.description=Protocol Buffer CRDT library for distributed conflict-free synchronization
