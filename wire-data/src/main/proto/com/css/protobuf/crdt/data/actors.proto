syntax = "proto3";

package com.css.protobuf.crdt.data;

option java_multiple_files = true;

/*
 * Simplified versioning state for efficient synchronization decisions.
 *
 * The Actors message provides a lightweight mechanism for devices to quickly
 * determine if synchronization is needed without comparing full VersionNode
 * structures. Each device maintains its own unique actor identifier and tracks
 * the latest version applied by each known device.
 *
 * SYNCHRONIZATION OPTIMIZATION:
 * Instead of comparing complex VersionNode trees to determine if a merge is
 * required, devices can compare their version_vector maps to quickly identify:
 * - Which device has newer changes
 * - Whether a full merge operation is necessary
 * - Which actors have updates that need to be synchronized
 *
 * ACTOR-BASED VERSIONING:
 * Each device/client is assigned a unique actor ID and maintains monotonically
 * increasing version numbers for their local changes. This provides:
 * - Conflict-free version assignment (each actor owns their version space)
 * - Efficient causality tracking (higher versions from same actor are newer)
 * - Fast synchronization decisions (compare version numbers instead of trees)
 *
 * USAGE PATTERN:
 * 1. Each device stores their unique identifier in local_actor
 * 2. When making changes, device increments their version in version_vector
 * 3. When receiving updates, device merges remote version_vector with their own
 * 4. Before full sync, devices compare version_vector to determine necessity
 *
 * Example synchronization decision:
 *   Device A: version_vector = {1001: 45, 1002: 23, 1003: 12}
 *   Device B: version_vector = {1001: 45, 1002: 25, 1003: 12}
 *
 *   Comparison shows Device B has newer changes from actor 1002 (25 > 23)
 *   → Full synchronization required
 *   → Device A needs to pull updates from Device B
 *
 * MEMORY EFFICIENCY:
 * This approach provides significant performance benefits:
 * - O(actors) comparison instead of O(document_size) VersionNode traversal
 * - Minimal network overhead for sync decisions
 * - Early termination of unnecessary sync operations
 * - Bounded memory growth (limited by number of active devices)
 */
message Actors {
  // Unique identifier for this device/client in the distributed system
  // Each device must use a consistent, unique actor ID across all operations
  int64 local_actor = 1;

  // Map of actor id -> latest local monotonic version applied by that device
  // Key: Actor ID (unique device identifier)
  // Value: Highest version number applied by that actor
  // Used for fast synchronization decisions without full VersionNode comparison
  map<int64, int64> version_vector = 2;
}
